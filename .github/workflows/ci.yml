name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l .; echo "run 'make fmt'"; exit 1)
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      # v7 installs golangci-lint v2 (built with a recent Go toolchain); v6
      # pulls the latest v1, which is built with go1.24 and rejects our go1.25
      # target. The .golangci.yml uses the v2 schema.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
