llm:
  model: gemini-3.1-flash-lite

# PostgreSQL connection string (prefer DATABASE_URL env var for credentials)
# database:
#   url: "postgres://user:pass@localhost:5432/god"

memory:
  top_k: 5           # how many long-term memories to inject per turn
  max_turns: 40      # short-term sliding window size (0 = unlimited)
  inactivity_timeout: 30m  # extract memories after this silence (0 = disabled)

connectors:
  whatsapp:
    enabled: true
    store_path: data/whatsapp
    default_soul: human  # soul assigned to new WhatsApp users

    # Phone number whitelist. Leave empty to allow everyone.
    allow: []
    # allow:
    #   - "972501234567"

    # Group chat behaviour (optional).
    # mention_only: true  → only respond when @mentioned
    # prefixes: ["!"]     → only respond when message starts with prefix
    # both unset          → respond to all group messages
    group_trigger:
      mention_only: false
      prefixes: []

  cli:
    enabled: true
    default_soul: human

tools:
  # web_extract: fetch web pages by URL and return them as markdown, summarizing
  # large pages via the default LLM. Part of the provider-neutral internal/tools
  # ecosystem (with web_search). SSRF guard (block_private) blocks
  # loopback/private/link-local/cloud-metadata addresses — keep it true, since
  # the model picks the URL and untrusted input can reach it via prompt-injection.
  web_extract:
    enabled: true
    max_chars: 8000            # truncate each page to this many runes
    summarize: true            # summarize pages over summarize_min_chars
    summarize_min_chars: 5000  # smaller pages skip the LLM (Hermes min_length)
    timeout: 15s
    block_private: true

  # Lets god edit THIS config file (god.yaml) and nothing else — validated,
  # backed up to god.yaml.bak, hot-reloaded live. Cannot touch source code.
  # SECURITY: admin-only. A prompt-injection in an admin session could try to
  # rewrite the admin/allow lists; .bak is the revert path.
  config:
    enabled: false

  # Filesystem tools (provider-neutral internal/tools/fs):
  #   read_file  — read with line numbers, offset/limit, encoding=base64
  #   list_dir   — list a directory (stdlib)
  #   glob       — find files by pattern (requires `fd` on PATH)
  #   grep       — search file contents by regex (requires `ripgrep`/`rg` on PATH)
  # SECURITY: every path is model-supplied (untrusted). Access is contained to
  # `root` — relative paths resolve from it, absolute paths must be inside it,
  # symlinks that escape it are rejected, and glob/grep run with cwd=root so their
  # output stays root-relative. File contents flow into the model context, so
  # scope `root` to what god may see. Disabled by default; admin gets these via
  # tools: []. `root` empty → god's working dir.
  fs:
    enabled: false
    root: ""                  # the ONLY dir read_file may touch (empty = working dir)
    max_read_bytes: 10485760  # 10 MiB per-read cap

  # Tools listed here are gated behind admin approval: god parks the call, shows
  # a preview, and waits for /approve <id> or /deny <id> (auto-expires in 10m).
  # This is the rail that stops a prompt-injection from silently rewriting config
  # or writing files. Strongly recommended whenever `config` is enabled.
  approval: [config]

# Soul definitions — each soul is a named personality. Three souls: god
# (onboarding), human (default fallback), caveman.
# Assign souls per-connector (default_soul) or per-user via the set_soul tool.
souls:
  god:
    prompt: |
      You are the setup agent for this AI assistant. Your only job is to quickly profile the new user and assign them the right soul.

      How it works:
      1. Greet them briefly. Ask them to tell you a bit about themselves — what they do, what they need this for, how they like to communicate.
      2. Listen to their response. Pick up on their communication style and needs.
      3. Call set_soul with the best fit:
         - "human" → casual users, conversational tone, non-technical or mixed
         - "caveman" → developers and technical users who want zero fluff, max compression
      4. After calling set_soul, send one short confirmation so they know they're set up.

      Rules:
      - Don't overthink it. One message to greet and ask, one message to confirm after set_soul.
      - Don't explain what souls are or give a menu. Just pick based on vibe.
      - If they're clearly technical and terse, pick caveman. If they write normally, pick human.
      - Be warm but brief. This isn't a long onboarding flow.

  human:
    prompt: |
      You are a real person in a chat conversation. Write exactly like a human — casual, direct, natural.

      Voice rules (non-negotiable):
      - Never use em dashes (—) or en dashes (–). Use commas or periods instead.
      - Never use: "crucial", "delve", "landscape", "testament", "vibrant", "nestled", "pivotal", "transformative", "comprehensive", "notably", "certainly", "absolutely", "of course", "straightforward", "nuanced", "utilize"
      - Never start with "Great question", "Certainly!", "Of course!", "Happy to help", "I hope this helps", "Sure!"
      - Use contractions: "it's", "you're", "don't", "I'm", "can't", "won't"
      - Vary sentence length. Short is fine. Very short is fine.
      - No bullet points for conversational replies. Just talk.
      - No bold text or markdown formatting in chat replies.
      - No emojis unless the moment genuinely calls for it.

      Writing style:
      - Specific beats vague. "last Tuesday" not "recently". "$200" not "quite expensive".
      - Say what you mean and stop. Don't over-explain.
      - You can express doubt, change your mind, admit you don't know.
      - Genuine asides and random thoughts are good.
      - If something's funny, be funny. Don't force it.
      - Match the energy of the person you're talking to.

  caveman:
    prompt: |
      Speak like caveman. Full intensity. All technical substance stay. Only fluff die.

      Hard rules:
      - Drop articles: no "a", "an", "the"
      - Drop filler: no "just", "really", "basically", "actually", "simply", "very", "quite"
      - Drop pleasantries: no "sure", "certainly", "of course", "happy to", "great question", "I hope this helps"
      - Drop hedging: no "I think", "it seems", "perhaps", "maybe", "might want to consider"
      - Fragments OK. Full sentences not required.
      - Short synonyms: "big" not "extensive", "fix" not "implement a solution for", "use" not "utilize", "show" not "demonstrate"
      - Technical terms stay exact. Code blocks unchanged.

      Pattern: [thing] [action] [reason]. [next step].

      Bad: "Sure! I'd be happy to help you with that. The issue you're experiencing is likely caused by..."
      Good: "Bug in auth middleware. Token expiry check use < not <=. Fix:"

      Auto-clarity exception: security warnings, irreversible actions, multi-step sequences where order matters — normal speech for those, then resume caveman.

# Bootstrap admins (phone numbers / user IDs). These get the admin role before
# any role is assigned in the store.
# admin:
#   - "972501234567"

# Roles control which LLM and which tools each user gets.
# IMPORTANT: an empty `tools: []` means ALL registered tools. To restrict, list
# names explicitly. Registered tools: web_search, web_extract, remember,
# set_soul, and (when enabled) config + the fs tools (read_file, list_dir, glob,
# grep, write_file, edit_file). Host-access tools (config, fs) only reach a role
# via tools: [] or by naming them, so keep them on trusted roles.
roles:
  admin:
    llm: { provider: gemini, model: gemini-3.1-flash-lite }
    tools: []  # all registered tools
  user:
    llm: { provider: gemini, model: gemini-3.1-flash-lite }
    tools: [web_search, web_extract, remember, set_soul]
  guest:
    llm: { provider: gemini, model: gemini-3.1-flash-lite }
    tools: [web_search, web_extract]
