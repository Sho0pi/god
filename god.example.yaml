llm:
  # Gemini model (overrides GEMINI_MODEL env var)
  model: gemini-3.1-flash-lite

connectors:
  whatsapp:
    enabled: true
    store_path: data/whatsapp
    # Phone number whitelist. Leave empty to allow everyone.
    # Accepts any format: +972501234567, 972501234567, etc.
    allow: []
    # allow:
    #   - "+972501234567"
    #   - "+1415555012"

  cli:
    enabled: true

tools:
  places:
    # Requires GOOGLE_PLACES_API_KEY env var.
    enabled: true
